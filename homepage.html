<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fitness calculator — we handle the math for you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #E3DDD4;
    --ink: #1C1B19;
    --ink-soft: #56524B;
    --accent: #3D5C4E;
    --line: rgba(28,27,25,0.18);
    --pin-vh: 100vh;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{ height:100%; overflow:hidden; overscroll-behavior:none; }

  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
  }

  a{ color:inherit; }

  /* ---------- pinned section ---------- */
  .pin-wrap{
    position:relative;
    height:100vh;
  }

  .pin-inner{
    height:100vh;
    display:flex;
    align-items:center;
    padding: 0 5vw;
    gap: 6vw;
  }

  .left{
    flex: 0 0 auto;
    max-width: 640px;
    padding-top: 40px;
  }

  .eyebrow{
    font-size:15px;
    letter-spacing:0.02em;
    color:var(--ink);
    margin-bottom:28px;
    opacity:0;
    animation: fadeUp .7s ease forwards .1s;
  }

  h1.headline{
    font-family:'Michroma', sans-serif;
    font-weight:400;
    text-transform:lowercase;
    font-size: clamp(40px, 6.2vw, 92px);
    line-height:1.02;
    letter-spacing:-0.01em;
    opacity:0;
    animation: fadeUp .8s ease forwards .25s;
  }

  .scroll-cta{
    margin-top:48px;
    opacity:0;
    animation: fadeUp .8s ease forwards .5s;
  }

  @keyframes fadeUp{
    from{ opacity:0; transform:translateY(16px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- micro-interaction button ---------- */
  .reveal-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    padding:6px 0;
    cursor:pointer;
    font-family:'Space Grotesk', sans-serif;
    font-size:15px;
    font-weight:500;
    color:var(--ink);
  }

  .reveal-btn .label{
    position:relative;
    display:inline-block;
    line-height:1;
  }

  .reveal-btn .label .base{ color:var(--ink); }

  .reveal-btn .label .accent{
    position:absolute;
    left:0; top:0;
    color:var(--accent);
    clip-path: inset(0 100% 0 0);
    transition: clip-path .28s ease;
  }

  .reveal-btn:hover .label .accent,
  .reveal-btn:focus-visible .label .accent{
    clip-path: inset(0 0 0 0);
  }

  .reveal-btn .icon{
    display:flex;
    color:var(--ink);
    transition: transform .22s ease .05s, color .22s ease .05s;
  }

  .reveal-btn:hover .icon,
  .reveal-btn:focus-visible .icon{
    transform: translateY(5px);
    color: var(--accent);
  }

  .reveal-btn .underline{
    position:absolute;
    left:0; bottom:0;
    height:1px;
    width:0;
    background:var(--ink);
    transition: width .28s ease;
  }

  .reveal-btn:hover .underline,
  .reveal-btn:focus-visible .underline{
    width:100%;
  }

  .reveal-btn:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 6px;
  }

  /* ---------- right: category panels ---------- */
  .right{
    flex:1 1 auto;
    position:relative;
    height: 440px;
    max-width: 460px;
  }

  .cat-panel{
    position:absolute;
    inset:0;
    opacity:0;
    transform: translateY(36px);
    transition: opacity .55s cubic-bezier(.22,.61,.36,1), transform .55s cubic-bezier(.22,.61,.36,1);
    pointer-events:none;
  }

  .cat-panel.active{
    opacity:1;
    transform: translateY(0);
    pointer-events:auto;
  }

  .cat-panel.prev{
    opacity:0;
    transform: translateY(-36px);
  }

  .cat-title{
    font-size:16px;
    font-weight:500;
    margin-bottom:22px;
    color:var(--ink);
  }

  .cat-list{
    list-style:none;
  }

  .cat-list li{
    margin-bottom:16px;
    font-size:16px;
    font-weight:400;
  }

  .cat-list a{
    text-decoration:underline;
    text-decoration-color: var(--line);
    text-underline-offset:4px;
    transition: color .2s ease, text-decoration-color .2s ease;
  }

  .cat-list a:hover{
    color: var(--accent);
    text-decoration-color: var(--accent);
  }

  /* progress indicator */
  .progress{
    position:absolute;
    right:-28px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:8px;
  }

  .progress .dot{
    width:5px; height:5px;
    border-radius:50%;
    background: var(--line);
    transition: background .3s ease, transform .3s ease;
  }

  .progress .dot.active{
    background: var(--accent);
    transform: scale(1.6);
  }

  /* ---------- reduced motion ---------- */
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .eyebrow, h1.headline, .scroll-cta{ animation:none; opacity:1; }
    .cat-panel{ transition:none; }
  }

  /* ---------- mobile ---------- */
  @media (max-width: 860px){
    .pin-inner{
      flex-direction:column;
      align-items:flex-start;
      justify-content:center;
      gap:36px;
      padding: 48px 6vw;
    }
    .left{ padding-top:0; }
    .headline{ font-size: clamp(34px, 10vw, 56px) !important; }
    .right{ width:100%; max-width:100%; height:280px; }
    .progress{ display:none; }
  }
</style>
</head>
<body>

  <section class="pin-wrap" id="pinWrap">
    <div class="pin-inner">

      <div class="left">
        <div class="eyebrow">fitness calculator</div>
        <h1 class="headline">we handle<br>the math<br>for you</h1>

        <div class="scroll-cta">
          <button class="reveal-btn" id="scrollBtn" aria-label="Explore calculators, scroll down">
            <span class="label">
              <span class="base">explore calculators</span>
              <span class="accent" aria-hidden="true">explore calculators</span>
            </span>
            <span class="icon">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 2V13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M2.5 8L8 13.5L13.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="underline"></span>
          </button>
        </div>
      </div>

      <div class="right">
        <div id="categories"></div>
        <div class="progress" id="progress"></div>
      </div>

    </div>
  </section>

<script>
  const data = [
    {
      title: "Weight Management & Body Composition",
      items: ["BMI Calculator","Body Fat Calculator","Ideal Weight Calculator","Healthy Weight Range","Lean Body Mass Calculator","Army Body Fat Calculator","Weight Loss Planner"]
    },
    {
      title: "Daily Calories & Energy",
      items: ["Calorie Calculator","BMR Calculator","TDEE Calculator","Calories Burned Calculator","Calorie Deficit/Surplus Planner"]
    },
    {
      title: "Nutrition & Macros",
      items: ["Macro Calculator","Protein Calculator","Carbohydrate Calculator","Fat Intake Calculator","Flexible Dieting (IIFYM)"]
    },
    {
      title: "Pregnancy & Fertility",
      items: ["Pregnancy Tracker","Due Date Calculator","Ovulation Calculator","Conception Date Calculator","Pregnancy Weight Gain Calculator","Pregnancy Conception Estimator","Period Calculator"]
    },
    {
      title: "Fitness Performance",
      items: ["One Rep Max Calculator","Target Heart Rate Calculator","Pace Calculator"]
    },
    {
      title: "Specialized Health",
      items: ["Body Type Calculator","Body Surface Area Calculator","GFR Calculator","BAC Calculator"]
    }
  ];

  const catContainer = document.getElementById('categories');
  const progress = document.getElementById('progress');
  const pinWrap = document.getElementById('pinWrap');
  const scrollBtn = document.getElementById('scrollBtn');

  data.forEach((cat, i) => {
    const panel = document.createElement('div');
    panel.className = 'cat-panel';
    panel.dataset.index = i;

    const title = document.createElement('div');
    title.className = 'cat-title';
    title.textContent = cat.title;
    panel.appendChild(title);

    const list = document.createElement('ul');
    list.className = 'cat-list';
    cat.items.forEach(item => {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#';
      a.textContent = item;
      li.appendChild(a);
      list.appendChild(li);
    });
    panel.appendChild(list);
    catContainer.appendChild(panel);

    const dot = document.createElement('div');
    dot.className = 'dot';
    dot.dataset.index = i;
    progress.appendChild(dot);
  });

  const panels = [...document.querySelectorAll('.cat-panel')];
  const dots = [...document.querySelectorAll('.progress .dot')];
  const n = panels.length;

  let currentIndex = 0;
  let isAnimating = false;
  const STEP_COOLDOWN = 650; // matches the .cat-panel transition duration

  function setActive(idx){
    panels.forEach((p, i) => {
      p.classList.remove('active','prev');
      if(i === idx) p.classList.add('active');
      else if(i === (idx - 1 + n) % n) p.classList.add('prev');
    });
    dots.forEach((d,i) => d.classList.toggle('active', i === idx));
  }

  // Looping index: wraps forward past the last category back to the
  // first, and backward past the first back to the last.
  function goTo(idx){
    if(isAnimating) return;
    isAnimating = true;
    currentIndex = ((idx % n) + n) % n;
    setActive(currentIndex);
    setTimeout(() => { isAnimating = false; }, STEP_COOLDOWN);
  }

  const next = () => goTo(currentIndex + 1);
  const prev = () => goTo(currentIndex - 1);

  setActive(currentIndex);

  // Wheel — one notch advances one category, loops indefinitely.
  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (Math.abs(e.deltaY) < 4) return;
    e.deltaY > 0 ? next() : prev();
  }, { passive: false });

  // Touch swipe.
  let touchStartY = null;
  window.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', (e) => {
    if (touchStartY === null) return;
    const delta = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(delta) > 30) { delta > 0 ? next() : prev(); }
    touchStartY = null;
  }, { passive: true });

  // Keyboard.
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowDown' || e.key === 'PageDown') { e.preventDefault(); next(); }
    if (e.key === 'ArrowUp' || e.key === 'PageUp') { e.preventDefault(); prev(); }
  });

  // Dots are directly navigable too.
  dots.forEach((d, i) => {
    d.style.cursor = 'pointer';
    d.addEventListener('click', () => goTo(i));
  });

  // CTA button advances one step, same as scrolling — loops too.
  scrollBtn.addEventListener('click', next);
</script>

</body>
</html>
